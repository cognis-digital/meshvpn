# meshvpn example: a two-region fleet using the 'partial' topology.
# Maintainer: Cognis Digital  |  License: COCL 1.0
#
# node 0 (gw) is a hub every node peers with. The remaining nodes also peer
# with others in their own 'group' (region), giving intra-region mesh + a
# cross-region hub, without a full N*N mesh. Exercises the optional per-node
# fields: dns, mtu, persistent_keepalive, group. No keys appear here.

listen_port = 51820
persistent_keepalive = 25

[node]
name        = gw
endpoint    = gw.example.net:51820
overlay_ip  = 10.80.0.1/32
allowed_ips = 10.80.0.0/24
mtu         = 1420

[node]
name        = us-a
endpoint    = us-a.example.net:51820
overlay_ip  = 10.80.0.11/32
allowed_ips = 10.80.0.11/32
group       = us
dns         = 10.80.0.1

[node]
name        = us-b
endpoint    = us-b.example.net:51820
overlay_ip  = 10.80.0.12/32
allowed_ips = 10.80.0.12/32
group       = us
dns         = 10.80.0.1

[node]
name        = eu-a
endpoint    = 198.51.100.7:51820
overlay_ip  = 10.80.0.21/32
allowed_ips = 10.80.0.21/32
group       = eu
persistent_keepalive = 15
