# meshvpn example fleet config
# Maintainer: Cognis Digital  |  License: COCL 1.0
#
# A small four-node overlay. The first [node] block (berlin) is treated as the
# hub for the hub-spoke topology. Overlay IPs live in the 10.66.0.0/24 range.
# No keys appear here -- meshvpn scaffolds placeholders at generate time.

listen_port = 51820

[node]
name        = berlin
endpoint    = berlin.example.net:51820
overlay_ip  = 10.66.0.1/32
allowed_ips = 10.66.0.1/32

[node]
name        = oslo
endpoint    = oslo.example.net:51820
overlay_ip  = 10.66.0.2/32
allowed_ips = 10.66.0.2/32

[node]
name        = lisbon
endpoint    = 198.51.100.23:51820
overlay_ip  = 10.66.0.3/32
allowed_ips = 10.66.0.3/32

[node]
name        = tokyo
endpoint    = tokyo.example.net:51821
overlay_ip  = 10.66.0.4/32
allowed_ips = 10.66.0.4/32
